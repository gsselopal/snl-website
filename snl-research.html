<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/assets/images/snl-logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research | Sustainable Nanoengineering Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..146,100..700;1,9..146,100..700&family=Space+Mono:ital,wght@0;400;0;700;1;400;1;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #03070f;
      color: rgba(255, 255, 255, 0.65);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'DM Serif Display', serif;
      color: #ffffff;
      line-height: 1.2;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: clamp(2rem, 4.5vw, 3rem);
      font-weight: 400;
      margin-bottom: 2rem;
    }

    h3 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
    }

    em {
      font-style: italic;
      color: #f59e0b;
    }

    a {
      color: #f59e0b;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #fbbf24;
    }

    /* Navigation */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(3,7,15,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 1.1rem 2rem;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-logo span {
      color: #fff;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      font-size: 0.88rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .nav-links a:hover, .nav-links a.active { color: #38bdf8; }

    @media (max-width: 768px) {
      .nav-links { gap: 1.2rem; }
      .nav-logo span + span { display: none; }
    }

    /* Hero Section */
    .hero {
      position: relative;
      min-height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #03070f;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 900px;
      padding: 2rem;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.5);
      color: #f59e0b;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-family: 'Space Mono', monospace;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hero h1 {
      margin-bottom: 1.5rem;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    /* Section Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    section {
      padding: 6rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    section:first-of-type {
      border-top: none;
    }

    /* Research Pillars - Tab Interface */
    .pillars-section { margin-top: 3rem; }
    .pillar-tabs { display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pillar-tab {
      flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(245,158,11,0.15);
      border-bottom: 3px solid transparent; cursor: pointer; padding: 1.4rem 1.25rem;
      text-align: left; transition: all 0.25s ease; min-width: 0; position: relative;
    }
    .pillar-tab:not(:first-child) { border-left: none; }
    .pillar-tab .tab-num {
      display: block; font-family: 'Space Mono', monospace; font-size: 0.65rem;
      color: rgba(245,158,11,0.5); margin-bottom: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .pillar-tab .tab-title {
      display: block; font-family: 'DM Serif Display', serif; font-size: 0.92rem;
      color: rgba(255,255,255,0.45); line-height: 1.35; transition: color 0.25s;
    }
    .pillar-tab:hover .tab-title { color: rgba(255,255,255,0.8); }
    .pillar-tab:hover { background: rgba(245,158,11,0.04); }
    .pillar-tab.active { border-bottom-color: #f59e0b; background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.35); border-bottom-color: #f59e0b; }
    .pillar-tab.active .tab-num { color: #f59e0b; }
    .pillar-tab.active .tab-title { color: #fff; }
    .pillar-panels { border: 1px solid rgba(245,158,11,0.18); border-top: none; border-radius: 0 0 0.75rem 0.75rem; background: rgba(245,158,11,0.025); }
    .pillar-panel { display: none; padding: 2.5rem 2.75rem; }
    .pillar-panel.active { display: block; }
    .panel-tags { display: flex; gap: 0.5rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .panel-tag {
      font-size: 0.72rem; font-family: 'Space Mono', monospace; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 0.22rem 0.7rem; border-radius: 2rem;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); color: #fbbf24;
    }
    .panel-body { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .panel-overview { font-size: 1.02rem; color: rgba(255,255,255,0.7); line-height: 1.85; }
    .panel-actions { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); flex-wrap: wrap; }
    .panel-btn {
      display: inline-block; padding: 0.55rem 1.3rem; border: 1px solid rgba(245,158,11,0.45);
      border-radius: 0.375rem; color: #f59e0b; font-size: 0.87rem; font-family: 'DM Sans', sans-serif;
      font-weight: 500; text-decoration: none; transition: all 0.2s;
    }
    .panel-btn:hover { background: rgba(245,158,11,0.1); border-color: #f59e0b; }
    .panel-directions h4 {
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(245,158,11,0.75); font-weight: 600; margin-bottom: 1rem;
    }
    .panel-directions ul { list-style: none; padding: 0; margin: 0; }
    .panel-directions li {
      padding: 0.6rem 0 0.6rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.68); font-size: 0.94rem; position: relative;
    }
    .panel-directions li:last-child { border-bottom: none; }
    .panel-directions li::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; background: #f59e0b; border-radius: 50%; opacity: 0.75;
    }
    /* Funders */
    .funders-section { margin-top: 5rem; }
    .funders-label {
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 2rem;
    }
    .funders-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .funder-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.65rem; padding: 1.5rem 1.25rem; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; text-decoration: none;
      transition: all 0.25s ease; min-height: 100px;
    }
    .funder-card:hover { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.04); transform: translateY(-2px); }
    .funder-card svg { display: block; }
    @media (max-width: 900px) { .funders-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .pillar-tabs { display: grid; grid-template-columns: 1fr 1fr; }
      .pillar-tab { border-left: 1px solid rgba(245,158,11,0.15) !important; }
      .pillar-panel { padding: 1.5rem; }
      .panel-body { grid-template-columns: 1fr; gap: 1.5rem; }
      .funders-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) { .pillar-tabs { grid-template-columns: 1fr; } }

  <section>
    <div class="container">

            <span class="tab-title">Photoelectrochemical Solar Energy</span>

            <span class="tab-num">02 / Hydrogen</span>
            <span class="tab-title">Green Hydrogen Production</span>
          </button>
          <button class="pillar-tab" onclick="switchPillar(2)">
            <span class="tab-num">03 / Agriculture</span>
            <span class="tab-title">Precision Agriculture &amp; Nano-Sensors</span>
          </button>
          <button class="pillar-tab" onclick="switchPillar(3)">
            <span class="tab-num">04 / Environment</span>
            <span class="tab-title">Environmental Remediation</span>
          </button>
        </div>
        <div class="pillar-panels">
          <!-- Panel 0 -->
          <div class="pillar-panel active" id="panel-0">
            <div class="panel-tags"><span class="panel-tag">Energy</span><span class="panel-tag">Primary Pillar</span></div>
            <div class="panel-body">
              <div class="panel-left">
                <p class="panel-overview">Our solar energy research focuses on engineering nanostructured photoelectrodes — primarily quantum dot-sensitized and perovskite-based systems — to maximize light harvesting efficiency and carrier lifetime.</p>
                <div class="panel-actions">
                  <a class="panel-btn" href="/publications">View Publications &rarr;</a>
                  <a class="panel-btn" href="/contact">Collaborate &rarr;</a>
                </div>
              </div>
              <div class="panel-directions">
                <h4>Key Research Directions</h4>
                <ul>
                  <li>Quantum dot solar cells</li>
                  <li>Perovskite photoelectrodes</li>
                  <li>Interface engineering</li>
                  <li>Charge transport optimization</li>
                </ul>
              </div>
            </div>
          </div>
          <!-- Panel 1 -->
          <div class="pillar-panel" id="panel-1">
            <div class="panel-tags"><span class="panel-tag">Hydrogen</span><span class="panel-tag">Clean Energy</span></div>
            <div class="panel-body">
              <div class="panel-left">
                <p class="panel-overview">We develop photocatalytic and photoelectrochemical systems for solar-driven water splitting, producing clean hydrogen without carbon emissions.</p>
                <div class="panel-actions">
                  <a class="panel-btn" href="/publications">View Publications &rarr;</a>
                  <a class="panel-btn" href="/contact">Collaborate &rarr;</a>
                </div>
              </div>
              <div class="panel-directions">
                <h4>Key Research Directions</h4>
                <ul>
                  <li>Photoelectrochemical water splitting</li>
                  <li>Cocatalyst design</li>
                  <li>Z-scheme systems</li>
                  <li>Hydrogen evolution reaction (HER)</li>
                </ul>
              </div>
            </div>
          </div>
          <!-- Panel 2 -->
          <div class="pillar-panel" id="panel-2">
            <div class="panel-tags"><span class="panel-tag">Agriculture</span><span class="panel-tag">Sensing</span></div>
            <div class="panel-body">
              <div class="panel-left">
                <p class="panel-overview">Leveraging nanoparticle optical properties to build next-generation biosensors for real-time crop monitoring, pathogen detection, and soil health assessment.</p>
                <div class="panel-actions">
                  <a class="panel-btn" href="/publications">View Publications &rarr;</a>
                  <a class="panel-btn" href="/contact">Collaborate &rarr;</a>
                </div>
              </div>
              <div class="panel-directions">
                <h4>Key Research Directions</h4>
                <ul>
                  <li>SERS-based biosensors</li>
                  <li>Quantum dot biomarkers</li>
                  <li>Field-deployable sensor arrays</li>
                  <li>Soil nutrient monitoring</li>
                </ul>
              </div>
            </div>
          </div>
          <!-- Panel 3 -->
          <div class="pillar-panel" id="panel-3">
            <div class="panel-tags"><span class="panel-tag">Environment</span><span class="panel-tag">Photocatalysis</span></div>
            <div class="panel-body">
              <div class="panel-left">
                <p class="panel-overview">Engineering photocatalytic nanomaterials that harness sunlight to degrade organic pollutants, heavy metals, and emerging contaminants in water and air.</p>
                <div class="panel-actions">
                  <a class="panel-btn" href="/publications">View Publications &rarr;</a>
                  <a class="panel-btn" href="/contact">Collaborate &rarr;</a>
                </div>
              </div>
              <div class="panel-directions">
                <h4>Key Research Directions</h4>
                <ul>
                  <li>TiO&#8322;/ZnO photocatalysts</li>
                  <li>Visible-light sensitization</li>
                  <li>Dye degradation</li>
                  <li>Heavy metal removal</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

      document.querySelectorAll('.pillar-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
      document.querySelectorAll('.pillar-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));

      text-align: left; transition: all 0.25s ease; min-width: 0; position: relative;
    }
    .pillar-tab:not(:first-child) { border-left: none; }
    .pillar-tab .tab-num {
      display: block; font-family: 'Space Mono', monospace; font-size: 0.65rem;
      color: rgba(245,158,11,0.5); margin-bottom: 0.45rem; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .pillar-tab .tab-title {
      display: block; font-family: 'DM Serif Display', serif; font-size: 0.92rem;
      color: rgba(255,255,255,0.45); line-height: 1.35; transition: color 0.25s;
    }
    .pillar-tab:hover .tab-title { color: rgba(255,255,255,0.8); }
    .pillar-tab:hover { background: rgba(245,158,11,0.04); }
    .pillar-tab.active { border-bottom-color: #f59e0b; background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.35); border-bottom-color: #f59e0b; }
    .pillar-tab.active .tab-num { color: #f59e0b; }
    .pillar-tab.active .tab-title { color: #fff; }
    .pillar-panels { border: 1px solid rgba(245,158,11,0.18); border-top: none; border-radius: 0 0 0.75rem 0.75rem; background: rgba(245,158,11,0.025); }
    .pillar-panel { display: none; padding: 2.5rem 2.75rem; }
    .pillar-panel.active { display: block; }
    .panel-tags { display: flex; gap: 0.5rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .panel-tag {
      font-size: 0.72rem; font-family: 'Space Mono', monospace; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 0.22rem 0.7rem; border-radius: 2rem;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.25); color: #fbbf24;
    }
    .panel-body { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .panel-overview { font-size: 1.02rem; color: rgba(255,255,255,0.7); line-height: 1.85; }
    .panel-actions { display: flex; gap: 1rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); flex-wrap: wrap; }
    .panel-btn {
      display: inline-block; padding: 0.55rem 1.3rem; border: 1px solid rgba(245,158,11,0.45);
      border-radius: 0.375rem; color: #f59e0b; font-size: 0.87rem; font-family: 'DM Sans', sans-serif;
      font-weight: 500; text-decoration: none; transition: all 0.2s;
    }
    .panel-btn:hover { background: rgba(245,158,11,0.1); border-color: #f59e0b; }
    .panel-directions h4 {
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(245,158,11,0.75); font-weight: 600; margin-bottom: 1rem;
    }
    .panel-directions ul { list-style: none; padding: 0; margin: 0; }
    .panel-directions li {
      padding: 0.6rem 0 0.6rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.68); font-size: 0.94rem; position: relative;
    }
    .panel-directions li:last-child { border-bottom: none; }
    .panel-directions li::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; background: #f59e0b; border-radius: 50%; opacity: 0.75;
    }
    /* Funders */
    .funders-section { margin-top: 5rem; }
    .funders-label {
      font-family: 'DM Sans', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 2rem;
    }
    .funders-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .funder-card {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0.65rem; padding: 1.5rem 1.25rem; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; text-decoration: none;
      transition: all 0.25s ease; min-height: 100px;
    }
    .funder-card:hover { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.04); transform: translateY(-2px); }
    .funder-card svg { display: block; }
    @media (max-width: 900px) { .funders-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .pillar-tabs { display: grid; grid-template-columns: 1fr 1fr; }
      .pillar-tab { border-left: 1px solid rgba(245,158,11,0.15) !important; }
      .pillar-panel { padding: 1.5rem; }
      .panel-body { grid-template-columns: 1fr; gap: 1.5rem; }
      .funders-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) { .pillar-tabs { grid-template-columns: 1fr; } }

                </ul>

                <div class="panel-actions">
                  <a class="panel-btn" href="/publications">View Publications &rarr;</a>

              </div>

                  <li>SERS-based biosensors</li>

                  <li>Field-deployable sensor arrays</li>
                  <li>Soil nutrient monitoring</li>

              </div>
            </div>
          </div>

            <div class="panel-body">
              <div class="panel-left">
                <p class="panel-overview">Engineering photocatalytic nanomaterials that harness sunlight to degrade organic pollutants, heavy metals, and emerging contaminants in water and air.</p>
                <div class="panel-actions">
